<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigate AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #0a0a0a;
      color: #ffffff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #4da3ff;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #ccc;
      transition: 0.3s;
    }

    nav a:hover {
      color: #4da3ff;
    }

    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .hero p {
      color: #aaa;
      max-width: 600px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      background: #4da3ff;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #1f7ae0;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 60px 40px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #4da3ff;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: #777;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Navigate AI</div>
  </header>

  <section class="hero">
    <h1>NAVIGATE AI</h1>
    <p>Networked AI for Value-Integrated Guidance And Treatment Efficiency​</p>
    <!-- <button class="btn" onclick="handleClick()">Get Started</button> -->
  </section>

  <footer>
    © 2026 Navigate AI. All rights reserved.
  </footer>

  <script>
    function handleClick() {
      alert("Welcome to Navigate AI 🚀");
    }
  </script>

</body>
</html>
